# Project:   machbash-rust
# File:      .releaserc.yaml
# Purpose:   Semantic release configuration
#
# License:   Apache-2.0 — HYPERI PTY LIMITED
# Copyright: (c) 2026 HYPERI PTY LIMITED

branches:
- main
tagFormat: v${version}
plugins:
- - '@semantic-release/commit-analyzer'
  - preset: conventionalcommits
    releaseRules:
    - breaking: true
      release: major
    - type: feat
      release: minor
    - type: fix
      release: patch
    - type: perf
      release: patch
    - type: sec
      release: patch
    - type: hotfix
      release: patch
    - type: security
      release: patch
    - type: docs
      release: false
    - type: test
      release: false
    - type: refactor
      release: false
    - type: style
      release: false
    - type: build
      release: false
    - type: ci
      release: false
    - type: chore
      release: false
    - type: deps
      release: false
    - type: revert
      release: false
    - type: wip
      release: false
    - type: cleanup
      release: false
    - type: data
      release: false
    - type: debt
      release: false
    - type: design
      release: false
    - type: infra
      release: false
    - type: meta
      release: false
    - type: ops
      release: false
    - type: review
      release: false
    - type: spike
      release: false
    - type: ui
      release: false
- '@semantic-release/release-notes-generator'
- - '@semantic-release/changelog'
  - changelogFile: CHANGELOG.md
- - '@semantic-release/exec'
  - prepareCmd: python3 -c "from pathlib import Path; import re; Path('VERSION').write_text('${nextRelease.version}\n');
      ct=Path('Cargo.toml').read_text(); ct=re.sub(r'^version\\s*=\\s*\"[^\"]*\"',
      'version = \"${nextRelease.version}\"', ct, count=1, flags=re.MULTILINE); Path('Cargo.toml').write_text(ct)"
- - '@semantic-release/git'
  - assets:
    - CHANGELOG.md
    - VERSION
    - Cargo.toml
    message: 'chore: version ${nextRelease.version} [skip ci]'

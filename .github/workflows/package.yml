# Project:   macbash
# File:      .github/workflows/package.yml
# Purpose:   Post-release packaging — runs after binaries land in R2.
#            Generates linux tarballs from hyperi-ci's raw binaries, builds
#            deb/rpm via nfpm, renders homebrew + scoop manifests, and
#            uploads all artefacts to R2 under the same versioned path.
#
# License:   Apache-2.0
# Copyright: (c) 2025-2026 HYPERI PTY LIMITED
#
# Trigger:   - workflow_run after Cross-build succeeds (the standard path)
#            - workflow_dispatch with tag input (manual fallback)
#
#            On workflow_run the tag is derived from the most recent v* tag,
#            same pattern as cross-build.yml's resolve-tag job. The linux
#            tarball jobs already poll R2 for the raw linux binary so a race
#            with hyperi-ci's slow publish step is tolerated.
#
# Status:    Linux + Darwin packaging is production. Scoop manifest is
#            EXPERIMENTAL — not in the formal test path.

name: Package

"on":
  workflow_run:
    workflows: [Cross-build]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        type: string
        required: true
        description: "Tag to package (e.g. v1.5.2). cross-build + main CI must have completed for this tag."

permissions:
  contents: read

env:
  R2_ENDPOINT: https://98d20454e2af7a9397ad9366a1641659.r2.cloudflarestorage.com
  R2_BUCKET: bin-repo
  R2_PUBLIC: https://downloads.hyperi.io

jobs:
  resolve-tag:
    # workflow_run gives us no inputs — derive the tag from the latest v* tag,
    # same pattern as cross-build.yml's resolve-tag job.
    name: Resolve tag to package
    runs-on: ubuntu-latest
    if: >-
      ${{ github.event_name == 'workflow_dispatch'
          || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      tag: ${{ steps.pick.outputs.tag }}
    steps:
      - name: Checkout (with tags)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Pick tag
        id: pick
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          else
            git fetch --tags --force origin
            tag=$(git tag --sort=-creatordate --list 'v*' | head -1)
          fi
          if [ -z "$tag" ]; then
            echo "::error::no tag to package"
            exit 1
          fi
          echo "Resolved tag: $tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  linux-tarball:
    name: Linux ${{ matrix.arch }} tarball + sha
    needs: resolve-tag
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout (default branch — packaging code lives here, not in the tagged source)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Wait for raw linux binary on R2
        shell: bash
        run: |
          set -euo pipefail
          URL="${R2_PUBLIC}/macbash/${{ needs.resolve-tag.outputs.tag }}/macbash-linux-${{ matrix.arch }}"
          for i in $(seq 1 20); do
            if curl -fsI "$URL" >/dev/null 2>&1; then exit 0; fi
            echo "attempt $i: not yet at $URL, sleeping 15s"; sleep 15
          done
          echo "::error::raw linux binary never appeared at $URL"
          exit 1

      - name: Download raw binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          curl -fsSL "${R2_PUBLIC}/macbash/${{ needs.resolve-tag.outputs.tag }}/macbash-linux-${{ matrix.arch }}" \
            -o "dist/macbash-linux-${{ matrix.arch }}"
          chmod +x "dist/macbash-linux-${{ matrix.arch }}"

      - name: Build tarball
        shell: bash
        run: |
          set -euo pipefail
          stage="dist/macbash-linux-${{ matrix.arch }}-stage"
          mkdir -p "$stage"
          cp "dist/macbash-linux-${{ matrix.arch }}" "$stage/macbash"
          [ -f LICENSE ] && cp LICENSE "$stage/" || true
          tar -czf "dist/macbash-linux-${{ matrix.arch }}.tar.gz" -C dist "$(basename "$stage")"
          rm -rf "$stage"
          ( cd dist && shasum -a 256 "macbash-linux-${{ matrix.arch }}" "macbash-linux-${{ matrix.arch }}.tar.gz" ) \
            > "dist/macbash-linux-${{ matrix.arch }}.sha256"
          ls -la dist

      - name: Upload to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          aws configure set aws_access_key_id "$R2_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$R2_SECRET_ACCESS_KEY"
          aws configure set region auto
          for dest in "s3://${R2_BUCKET}/macbash/${{ needs.resolve-tag.outputs.tag }}/" "s3://${R2_BUCKET}/macbash/latest/"; do
            aws s3 cp --endpoint-url "$R2_ENDPOINT" \
              "dist/macbash-linux-${{ matrix.arch }}.tar.gz" "$dest"
            aws s3 cp --endpoint-url "$R2_ENDPOINT" \
              "dist/macbash-linux-${{ matrix.arch }}.sha256" "$dest"
          done

  deb-rpm:
    name: nfpm deb + rpm (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: [resolve-tag, linux-tarball]
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout (default branch — packaging code lives here, not in the tagged source)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install nfpm
        shell: bash
        run: |
          set -euo pipefail
          NFPM_VERSION="2.41.3"
          curl -fsSL -o /tmp/nfpm.deb \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_amd64.deb"
          sudo dpkg -i /tmp/nfpm.deb

      - name: Download raw binary from R2
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          curl -fsSL "${R2_PUBLIC}/macbash/${{ needs.resolve-tag.outputs.tag }}/macbash-linux-${{ matrix.arch }}" \
            -o "dist/macbash-linux-${{ matrix.arch }}"
          chmod +x "dist/macbash-linux-${{ matrix.arch }}"

      - name: Render nfpm.yaml
        shell: bash
        env:
          NFPM_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          version="${{ needs.resolve-tag.outputs.tag }}"; version="${version#v}"
          ./packaging/render-release.sh "$version" --from-r2 || true
          # render-release outputs packaging/dist/release/nfpm.yaml; confirm
          test -f packaging/dist/release/nfpm.yaml

      - name: Build deb + rpm
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          nfpm package -f packaging/dist/release/nfpm.yaml -p deb -t out/
          nfpm package -f packaging/dist/release/nfpm.yaml -p rpm -t out/
          ls -la out
          # Per-arch sha for the packages
          ( cd out && shasum -a 256 ./* ) > "out/macbash-linux-${{ matrix.arch }}.packages.sha256"

      - name: Upload to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          aws configure set aws_access_key_id "$R2_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$R2_SECRET_ACCESS_KEY"
          aws configure set region auto
          for dest in "s3://${R2_BUCKET}/macbash/${{ needs.resolve-tag.outputs.tag }}/" "s3://${R2_BUCKET}/macbash/latest/"; do
            for f in out/*; do
              aws s3 cp --endpoint-url "$R2_ENDPOINT" "$f" "$dest"
            done
          done

  manifests:
    name: Render homebrew + scoop manifests + static install scripts
    runs-on: ubuntu-latest
    needs: [resolve-tag, linux-tarball]
    steps:
      - name: Checkout (default branch — packaging code lives here, not in the tagged source)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Render static install scripts
        shell: bash
        run: |
          set -euo pipefail
          ./packaging/render.sh
          ls -la packaging/dist

      - name: Render per-version manifests
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.resolve-tag.outputs.tag }}"; version="${version#v}"
          ./packaging/render-release.sh "$version" --from-r2
          find packaging/dist/release -type f | sort

      - name: Upload manifests + install scripts to R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          aws configure set aws_access_key_id "$R2_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$R2_SECRET_ACCESS_KEY"
          aws configure set region auto

          # Per-version manifests under /<tag>/manifests/ + /latest/manifests/
          for dest in "s3://${R2_BUCKET}/macbash/${{ needs.resolve-tag.outputs.tag }}/manifests/" \
                      "s3://${R2_BUCKET}/macbash/latest/manifests/"; do
            aws s3 cp --recursive --endpoint-url "$R2_ENDPOINT" \
              packaging/dist/release/ "$dest"
          done

          # Static install scripts at /macbash/install.sh (curl-pipe target).
          # Also mirror to per-version path for reproducibility — pinning a
          # tag-specific install.sh URL lets users install a known-good copy
          # of the script that downloaded the same-version binary.
          for f in install.sh install.ps1 uninstall.sh uninstall.ps1; do
            for dest in "s3://${R2_BUCKET}/macbash/$f" \
                        "s3://${R2_BUCKET}/macbash/${{ needs.resolve-tag.outputs.tag }}/$f"; do
              # Use text/plain content-type so curl/iex render in browser too.
              ct="text/x-shellscript"
              case "$f" in *.ps1) ct="text/plain" ;; esac
              aws s3 cp --endpoint-url "$R2_ENDPOINT" \
                --content-type "$ct" \
                "packaging/dist/$f" "$dest"
            done
          done

  publish-tap-bucket:
    name: Push formula + scoop manifest to tap / bucket repos
    runs-on: ubuntu-latest
    needs: [resolve-tag, manifests]
    env:
      PROJECT: macbash
      TAP_REPO: hyperi-io/homebrew-tap
      BUCKET_REPO: hyperi-io/scoop-bucket
    steps:
      - name: Mint installation token via org GitHub App
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: hyperi-io
          repositories: |
            homebrew-tap
            scoop-bucket

      - name: Fetch rendered manifests from R2
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p staging
          curl -fsSL "${R2_PUBLIC}/macbash/${{ needs.resolve-tag.outputs.tag }}/manifests/homebrew/${PROJECT}.rb" \
            -o staging/formula.rb
          curl -fsSL "${R2_PUBLIC}/macbash/${{ needs.resolve-tag.outputs.tag }}/manifests/scoop/${PROJECT}.json" \
            -o staging/manifest.json

      - name: Configure git identity
        shell: bash
        run: |
          git config --global user.name "hyperi-bot"
          git config --global user.email "bot@hyperi.io"

      - name: Push to homebrew-tap
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${TAP_REPO}.git" tap
          mkdir -p tap/Formula
          cp staging/formula.rb "tap/Formula/${PROJECT}.rb"
          cd tap
          if git diff --quiet -- "Formula/${PROJECT}.rb"; then
            echo "homebrew-tap: ${PROJECT}.rb unchanged for ${TAG}"
          else
            git add "Formula/${PROJECT}.rb"
            git commit -m "${PROJECT} ${TAG#v}"
            git push origin HEAD
            echo "homebrew-tap: pushed ${PROJECT} ${TAG}"
          fi

      - name: Push to scoop-bucket
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${BUCKET_REPO}.git" bucket
          mkdir -p bucket/bucket
          cp staging/manifest.json "bucket/bucket/${PROJECT}.json"
          cd bucket
          if git diff --quiet -- "bucket/${PROJECT}.json"; then
            echo "scoop-bucket: ${PROJECT}.json unchanged for ${TAG}"
          else
            git add "bucket/${PROJECT}.json"
            git commit -m "${PROJECT} ${TAG#v}"
            git push origin HEAD
            echo "scoop-bucket: pushed ${PROJECT} ${TAG}"
          fi

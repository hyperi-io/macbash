# Project:   macbash
# File:      .github/workflows/cross-build.yml
# Purpose:   Build darwin + windows binaries (outside hyperi-ci linux matrix) and
#            upload to the same R2 path layout hyperi-ci uses.
#
# License:   Apache-2.0
# Copyright: (c) 2025-2026 HYPERI PTY LIMITED
#
# Trigger:   - workflow_run after CI succeeds (most common path — fires when
#              hyperi-ci's publish step tags vX.Y.Z; the [skip ci] suffix on
#              the chore commit blocks the tag-push trigger so we use the
#              ci-completion event instead).
#            - on tag push (vX.Y.Z) → fallback for tags pushed without the
#              [skip ci] suffix (manual tagging, foreign release tools, etc.).
#            - workflow_dispatch with `tag` input → retroactive / out-of-band.
#
# Status:    Windows builds are EXPERIMENTAL — best effort, not in the formal
#            test path (see packaging/README.md).

name: Cross-build

"on":
  push:
    tags:
      - "v*"
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        type: string
        required: true
        description: "Tag to retroactively cross-build (e.g. v1.5.2)"

permissions:
  contents: read

jobs:
  resolve-tag:
    # workflow_run gives us no inputs and `github.ref_name` resolves to the
    # default branch, so derive the tag explicitly. Skips when CI failed or
    # when CI didn't produce a new tag (non-publish run).
    name: Resolve tag to build
    runs-on: ubuntu-latest
    if: >-
      ${{ github.event_name == 'workflow_dispatch'
          || github.event_name == 'push'
          || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      tag: ${{ steps.pick.outputs.tag }}
    steps:
      - name: Checkout (with tags)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Pick tag
        id: pick
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            workflow_dispatch)
              tag="${{ inputs.tag }}"
              ;;
            push)
              tag="${{ github.ref_name }}"
              ;;
            workflow_run)
              # CI completed successfully. Pick the most recent v-tag — if
              # CI was a publish run it will have created vX.Y.Z; if it was a
              # validate-only run the latest tag is unchanged and rebuilding
              # is idempotent (same source → same bytes overwrite the same R2
              # paths).
              git fetch --tags --force origin
              tag=$(git tag --sort=-creatordate --list 'v*' | head -1)
              if [ -z "$tag" ]; then
                echo "::notice::no v-tag found — nothing to cross-build"
                echo "tag=" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              ;;
          esac
          echo "Resolved tag: $tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

  build:
    name: ${{ matrix.os_arch }}
    needs: resolve-tag
    if: ${{ needs.resolve-tag.outputs.tag != '' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # darwin-amd64 cross-compiled from arm64 — macos-13 (intel) runners
          # are heavily queued/deprecating; macos-latest is arm64 by default and
          # Apple's toolchain natively cross-compiles to x86_64 via the SDK.
          - target: x86_64-apple-darwin
            runner: macos-latest
            os_arch: darwin-amd64
            zigbuild: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            os_arch: darwin-arm64
            zigbuild: false
          - target: x86_64-pc-windows-gnu
            runner: ubuntu-latest
            os_arch: windows-amd64
            zigbuild: true
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Derive version from tag
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.resolve-tag.outputs.tag }}"
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          # Stamp Cargo.toml so the binary's --version output matches the tag.
          # Same trick hyperi-ci's build job uses on the linux matrix.
          python3 - <<PY
          import re, pathlib
          p = pathlib.Path("Cargo.toml"); t = p.read_text()
          t = re.sub(r'^version\s*=\s*"[^"]*"', f'version = "$version"', t, count=1, flags=re.MULTILINE)
          p.write_text(t)
          pathlib.Path("VERSION").write_text("$version\n")
          PY

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + target
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cross-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}

      # Windows via cargo-zigbuild — pure Linux cross-compile, no MSVC needed.
      - name: Install zig
        if: matrix.zigbuild
        uses: mlugg/setup-zig@8d6198c65fb0feaa111df26e6b467fea8345e46f # v2.0.5
        with:
          version: 0.15.1

      - name: Install cargo-zigbuild
        if: matrix.zigbuild
        shell: bash
        run: cargo install --locked cargo-zigbuild

      - name: Build (native)
        if: ${{ !matrix.zigbuild }}
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --target ${{ matrix.target }}

      - name: Build (cargo-zigbuild)
        if: matrix.zigbuild
        shell: bash
        run: |
          set -euo pipefail
          cargo zigbuild --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          ext="${{ matrix.ext || '' }}"
          os_arch="${{ matrix.os_arch }}"
          src="target/${{ matrix.target }}/release/macbash${ext}"
          raw_name="macbash-${os_arch}${ext}"
          cp "$src" "dist/${raw_name}"
          # Tarball / zip — what brew/scoop/winget download
          stage_dir="dist/macbash-${os_arch}-stage"
          mkdir -p "$stage_dir"
          cp "$src" "$stage_dir/macbash${ext}"
          [ -f LICENSE ] && cp LICENSE "$stage_dir/" || true
          if [ -n "$ext" ]; then
            # Windows: zip
            ( cd dist && zip -q "macbash-${os_arch}.zip" -j "macbash-${os_arch}-stage/"* )
            archive="macbash-${os_arch}.zip"
          else
            # Unix: tar.gz
            tar -czf "dist/macbash-${os_arch}.tar.gz" -C dist "macbash-${os_arch}-stage"
            archive="macbash-${os_arch}.tar.gz"
          fi
          rm -rf "$stage_dir"
          # Per-arch checksums (raw binary + archive). Per-arch filenames so
          # multiple matrix uploads don't last-write-wins on s3.
          sums_file="dist/macbash-${os_arch}.sha256"
          if command -v shasum >/dev/null 2>&1; then
            ( cd dist && shasum -a 256 "${raw_name}" "${archive}" ) > "$sums_file"
          else
            ( cd dist && sha256sum "${raw_name}" "${archive}" ) > "$sums_file"
          fi
          ls -la dist

      - name: Configure AWS CLI for Cloudflare R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${R2_ACCESS_KEY_ID:-}" ] || [ -z "${R2_SECRET_ACCESS_KEY:-}" ]; then
            echo "::error::R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY not set"
            exit 1
          fi
          aws configure set aws_access_key_id "$R2_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$R2_SECRET_ACCESS_KEY"
          aws configure set region auto

      - name: Upload to R2
        env:
          R2_ENDPOINT: https://98d20454e2af7a9397ad9366a1641659.r2.cloudflarestorage.com
          R2_BUCKET: bin-repo
          TAG: ${{ steps.ver.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          dest_versioned="s3://${R2_BUCKET}/macbash/${TAG}/"
          dest_latest="s3://${R2_BUCKET}/macbash/latest/"
          for f in dist/*; do
            for dest in "$dest_versioned" "$dest_latest"; do
              aws s3 cp --endpoint-url "$R2_ENDPOINT" "$f" "$dest"
            done
          done
          echo "Published to https://downloads.hyperi.io/macbash/${TAG}/"

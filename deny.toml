[advisories]
yanked = "deny"
ignore = []

[licenses]
# Zlib: pulled in by vergen-gix -> gix -> {foldhash, zlib-rs}. OSI-approved
# permissive licence, same family as MIT/ISC; no copyleft.
allow = ["Apache-2.0", "MIT", "BSD-3-Clause", "BSD-2-Clause", "ISC", "Unicode-3.0", "CC0-1.0", "Zlib"]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
